<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Store Assistant</title>
<style>
  :root {
    --ink: #16181d;
    --ink-soft: #2668b2;
    --panel-bg: #f1f3f5;
    --panel-border: #e7e9ec;
    --header-bg: #0b4068;
    --accent: #2668b2;
    --accent-soft: #2668b2;
    --bubble-user-bg: #d2effd;
    --bubble-user-ink: #16181d;
    --bubble-bot-bg: #E5E4E2;
    --bubble-bot-ink: #16181d;
    --radius-lg: 18px;
    --radius-md: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    font-family: var(--font);
  }

  #sa-page {
    display: flex;
    flex-direction: column;
    max-height: min(640px, 100dvh);
    max-width: 860px;
    margin: 0 auto;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(16, 18, 21, 0.08);
  }

  #sa-header {
    background: var(--header-bg);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .sa-header-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sa-header-avatar svg { width: 20px; height: 20px; }
  .sa-header-text { display: flex; flex-direction: column; gap: 2px; }
  .sa-title { font-size: 15px; font-weight: 600; }
  .sa-status { font-size: 12.5px; color: #9ca3af; display: flex; align-items: center; gap: 6px; }
  .sa-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 0 rgba(14, 165, 164, 0.6);
    animation: sa-pulse 2s infinite;
  }
  @media (prefers-reduced-motion: reduce) { .sa-dot { animation: none; } }
  @keyframes sa-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(14, 165, 164, 0.5); }
    70%  { box-shadow: 0 0 0 6px rgba(14, 165, 164, 0); }
    100% { box-shadow: 0 0 0 0 rgba(14, 165, 164, 0); }
  }

  #sa-messages {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: var(--panel-bg);
  }
  #sa-messages::-webkit-scrollbar { width: 8px; }
  #sa-messages::-webkit-scrollbar-thumb { background: #e2e4e8; border-radius: 6px; }

  .sa-row { display: flex; }
  .sa-row.sa-from-user { justify-content: flex-end; }
  .sa-row.sa-from-bot  { justify-content: flex-start; }
  .sa-row.sa-system-row { justify-content: center; margin: 2px 0; }
  .sa-system-note {
    font-size: 12px;
    color: var(--ink-soft);
    background: #f4f5f6;
    padding: 4px 12px;
    border-radius: 999px;
  }

  .sa-msg {
    max-width: 70%;
    padding: 11px 14px;
    border-radius: var(--radius-md);
    font-size: 14.5px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .sa-from-user .sa-msg { background: var(--bubble-user-bg); color: var(--bubble-user-ink); border-bottom-right-radius: 4px; }
  .sa-from-bot  .sa-msg { background: var(--bubble-bot-bg);  color: var(--bubble-bot-ink);  border-bottom-left-radius: 4px; }

  .sa-quick-replies {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
    max-width: 70%;
  }
  .sa-quick-btn {
    text-align: left;
    background: var(--accent-soft);
    color: #d2effd;
    border: 1px solid #cdeceb;
    border-radius: var(--radius-md);
    padding: 10px 14px;
    font-size: 14px;
    font-family: var(--font);
    cursor: pointer;
    transition: background .12s, color .12s;
  }
  .sa-quick-btn:hover { background: #d2effd; color: var(--accent-soft); }
  .sa-quick-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  .sa-typing { display: flex; gap: 4px; padding: 11px 14px; }
  .sa-typing span {
    width: 6px; height: 6px; border-radius: 50%; background: #b6bac1;
    animation: sa-bounce 1.2s infinite;
  }
  .sa-typing span:nth-child(2) { animation-delay: 0.15s; }
  .sa-typing span:nth-child(3) { animation-delay: 0.30s; }
  @media (prefers-reduced-motion: reduce) { .sa-typing span { animation: none; } }
  @keyframes sa-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30%            { transform: translateY(-4px); opacity: 1; }
  }

  #sa-form {
    display: flex;
    gap: 10px;
    padding: 16px 24px calc(16px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid var(--panel-border);
    flex-shrink: 0;
    background: var(--panel-bg);
  }
  #sa-input {
    flex: 1;
    border: 1px solid var(--panel-border);
    border-radius: 999px;
    padding: 12px 18px;
    font-size: 14.5px;
    font-family: var(--font);
    background: #fff;
    outline: none;
  }
  #sa-input:focus { border-color: var(--accent); }
  #sa-send {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  #sa-send:hover { background: #588cb4; }
  #sa-send:focus-visible { outline: 2px solid var(--header-bg); outline-offset: 1px; }
  #sa-send svg { width: 18px; height: 18px; }

  @media (max-width: 600px) {
    #sa-page { max-height: 100dvh; border-radius: 0; }
    #sa-header { padding: 12px 16px; gap: 10px; }
    #sa-messages { padding: 16px; gap: 10px; }
    #sa-form { padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px)); gap: 8px; }
    #sa-input { padding: 10px 16px; }
    #sa-send { width: 40px; height: 40px; }
    .sa-msg, .sa-quick-replies { max-width: 88%; }
  }
  @media (max-width: 360px) {
    #sa-header { padding: 10px 12px; }
    .sa-title { font-size: 14px; }
    .sa-status { font-size: 12px; }
    #sa-messages { padding: 12px; }
    .sa-msg, .sa-quick-replies { max-width: 92%; }
  }
</style>
  <script src="config.js"></script>
</head>
<body>

<div id="sa-page">
  <header id="sa-header">
    <div class="sa-header-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
    </div>
    <div class="sa-header-text">
      <span class="sa-title">Store Assistant</span>
      <span class="sa-status"><span class="sa-dot"></span>Online</span>
    </div>
  </header>

  <div id="sa-messages"></div>

  <form id="sa-form">
    <input id="sa-input" type="text" placeholder="Type your question..." autocomplete="off" />
    <button id="sa-send" type="submit" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </form>
</div>

<script>
(function () {
  // Change this to your Cloudflare Tunnel URL when deploying live.
  // For local testing leave it as localhost.
  const API_BASE = window.SA_API_BASE || 'http://localhost:3000';

  // How many exchanges to remember and send to the AI (3 = last 3 back-and-forths).
  // Higher = smarter follow-ups but slower responses from a local model.
  const MAX_HISTORY = 3;

  const messages = document.getElementById('sa-messages');
  const form     = document.getElementById('sa-form');
  const input    = document.getElementById('sa-input');

  // ---- Session state ----
  let currentCategory    = null;
  let currentProductId   = null;
  let currentProductName = null;
  let conversationHistory = []; // rolling cache of last MAX_HISTORY exchanges

  function pushHistory(role, content) {
    if (!content || !content.trim()) return;
    conversationHistory.push({ role, content });
    // Keep only the last MAX_HISTORY * 2 entries (user + assistant pairs)
    if (conversationHistory.length > MAX_HISTORY * 2) {
      conversationHistory = conversationHistory.slice(-(MAX_HISTORY * 2));
    }
  }

  // Call when the user picks a new main topic — wipes product context and
  // conversation history so old answers don't bleed into the new topic.
  function clearSession() {
    conversationHistory  = [];
    currentProductId     = null;
    currentProductName   = null;
    currentCategory      = null;
  }

  function updateProductContext(id, name) {
    if (!id || id === currentProductId) return;
    currentProductId   = id;
    currentProductName = name;
    addSystemNote(`Looking at: ${name}`);
  }

  // ---- UI helpers ----
  function scrollToBottom() { messages.scrollTop = messages.scrollHeight; }

  function addMessage(text, from) {
    const row    = document.createElement('div');
    row.className = `sa-row sa-from-${from}`;
    const bubble = document.createElement('div');
    bubble.className = 'sa-msg';
    bubble.textContent = text;
    row.appendChild(bubble);
    messages.appendChild(row);
    scrollToBottom();
  }

  function addSystemNote(text) {
    const row = document.createElement('div');
    row.className = 'sa-row sa-system-row';
    row.innerHTML = `<span class="sa-system-note">${text}</span>`;
    messages.appendChild(row);
    scrollToBottom();
  }

  function addQuickReplies(items, onPick) {
    const row  = document.createElement('div');
    row.className = 'sa-row sa-from-bot';
    const wrap = document.createElement('div');
    wrap.className = 'sa-quick-replies';
    items.forEach(({ label, value }) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'sa-quick-btn';
      btn.textContent = label;
      btn.addEventListener('click', () => onPick(value, label));
      wrap.appendChild(btn);
    });
    row.appendChild(wrap);
    messages.appendChild(row);
    scrollToBottom();
  }

  let typingRow = null;
  function showTyping() {
    typingRow = document.createElement('div');
    typingRow.className = 'sa-row sa-from-bot';
    typingRow.innerHTML = '<div class="sa-typing"><span></span><span></span><span></span></div>';
    messages.appendChild(typingRow);
    scrollToBottom();
  }
  function hideTyping() {
    if (typingRow) { typingRow.remove(); typingRow = null; }
  }

  function friendlyError() {
    hideTyping();
    addMessage("Sorry, I can't reach the assistant right now. Make sure the backend server is running.", 'bot');
  }

  // ---- Menu ----
  const TOP_MENU = [
    {
      label: 'Product Questions',
      kind: 'freetext',
      prompt: 'What would you like to know? Ask about a specific product by name or ID, or browse — e.g. "what cameras are available".',
    },
    { label: 'Orders & Shipping', kind: 'category', category: 'shipping_orders' },
    {
      label: 'Compare Products',
      kind: 'freetext',
      prompt: "Tell me which two products you're looking at and I'll do my best.",
    },
    {
      label: 'Customer Support',
      kind: 'freetext',
      prompt: 'Describe your question or issue and I\'ll do my best to help.',
    },
  ];

  function loadCategories() {
    clearSession();
    addMessage('Hi! What can I help you with today?', 'bot');
    addQuickReplies(
      TOP_MENU.map((item, i) => ({ label: item.label, value: i })),
      (index) => handleTopMenuChoice(TOP_MENU[index])
    );
  }

  function handleTopMenuChoice(item) {
    clearSession(); // fresh context for every new main topic
    addMessage(item.label, 'user');

    if (item.kind === 'category') {
      loadMenu(item.category, item.label, { skipUserEcho: true });
      return;
    }

    addMessage(item.prompt, 'bot');
    input.focus();
  }

  async function loadMenu(category, categoryLabel, opts = {}) {
    if (!opts.skipUserEcho) addMessage(categoryLabel, 'user');
    currentCategory = category;
    showTyping();
    try {
      const res = await fetch(`${API_BASE}/api/menu/${category}`);
      if (!res.ok) {
        hideTyping();
        addMessage(`No questions found for "${categoryLabel}" yet.`, 'bot');
        return;
      }
      const data = await res.json();
      hideTyping();
      addMessage('Choose a question:', 'bot');
      const items = data.options.map((o) => ({ label: o.question, value: o.id }));
      items.push({ label: '\u2190 Back to topics', value: '__back__' });
      addQuickReplies(items, (entryId, label) => {
        if (entryId === '__back__') { addMessage(label, 'user'); loadCategories(); }
        else askMenu(category, entryId, label);
      });
    } catch { friendlyError(); }
  }

  // ---- API calls ----
  async function askMenu(category, entryId, label) {
    addMessage(label, 'user');
    showTyping();
    try {
      const res = await fetch(`${API_BASE}/api/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          category,
          entryId,
          currentProductId,
          conversationHistory,
        }),
      });
      const data = await res.json();
      hideTyping();
      if (data.matched_product_id) updateProductContext(data.matched_product_id, data.matched_product_name);
      const answer = data.answer || 'Sorry, something went wrong.';
      addMessage(answer, 'bot');
      pushHistory('user', label);
      pushHistory('assistant', answer);
    } catch { friendlyError(); }
  }

  async function askFreeText(question) {
    addMessage(question, 'user');
    showTyping();
    try {
      const res = await fetch(`${API_BASE}/api/ask-text`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question,
          category: currentCategory,
          currentProductId,
          conversationHistory,
        }),
      });
      const data = await res.json();
      hideTyping();
      if (data.matched_product_id) updateProductContext(data.matched_product_id, data.matched_product_name);
      const answer = data.answer || 'Sorry, something went wrong.';
      addMessage(answer, 'bot');
      pushHistory('user', question);
      pushHistory('assistant', answer);
    } catch { friendlyError(); }
  }

  // ---- Form ----
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;
    input.value = '';
    askFreeText(question);
  });

  // ---- Boot ----
  loadCategories();
  input.focus();
})();
</script>
</body>
</html>
