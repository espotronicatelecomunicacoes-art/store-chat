<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Assistant</title>
  <style>
    :root {
      --ink: #16181d;
      --ink-soft: #2668b2;
      --panel-bg: #f1f3f5;
      --panel-border: #e7e9ec;
      --header-bg: #0b4068;
      --accent: #2668b2;
      --accent-soft: #2668b2;
      --bubble-user-bg: #d2effd;
      --bubble-user-ink: #16181d;
      --bubble-bot-bg: #E5E4E2;
      --bubble-bot-ink: #16181d;
      --radius-lg: 18px;
      --radius-md: 12px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      font-family: var(--font);
    }

    #sa-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      margin-top: 15px;
    }

    #sa-page {
      --sa-widget-height: 640px;
      display: flex;
      flex-direction: column;
      height: var(--sa-widget-height);
      max-height: 100dvh;
      width: min(100vw, 840px);
      margin: 0 auto;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(16, 18, 21, 0.08);
    }

    #sa-header {
      background: var(--header-bg);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .sa-header-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sa-header-avatar svg {
      width: 20px;
      height: 20px;
    }

    .sa-header-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sa-title {
      font-size: 15px;
      font-weight: 600;
    }

    .sa-status {
      font-size: 12.5px;
      color: #9ca3af;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sa-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(14, 165, 164, 0.6);
      animation: sa-pulse 2s infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      .sa-dot {
        animation: none;
      }
    }

    @keyframes sa-pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(14, 165, 164, 0.5);
      }

      70% {
        box-shadow: 0 0 0 6px rgba(14, 165, 164, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(14, 165, 164, 0);
      }
    }

    #sa-lang-toggle {
      margin-left: auto;
      display: flex;
      gap: 2px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      padding: 2px;
      flex-shrink: 0;
    }

    .sa-lang-btn {
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.75);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 999px;
      cursor: pointer;
    }

    .sa-lang-btn.sa-lang-active {
      background: #fff;
      color: var(--header-bg);
    }

    .sa-lang-btn:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 1px;
    }

    #sa-messages {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--panel-bg);
    }

    #sa-messages::-webkit-scrollbar {
      width: 8px;
    }

    #sa-messages::-webkit-scrollbar-thumb {
      background: #e2e4e8;
      border-radius: 6px;
    }

    .sa-row {
      display: flex;
    }

    .sa-row.sa-from-user {
      justify-content: flex-end;
    }

    .sa-row.sa-from-bot {
      justify-content: flex-start;
    }

    .sa-row.sa-system-row {
      justify-content: center;
      margin: 2px 0;
    }

    .sa-system-note {
      font-size: 12px;
      color: var(--ink-soft);
      background: #f4f5f6;
      padding: 4px 12px;
      border-radius: 999px;
    }

    .sa-msg {
      max-width: 70%;
      padding: 11px 14px;
      border-radius: var(--radius-md);
      font-size: 14.5px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .sa-from-user .sa-msg {
      background: var(--bubble-user-bg);
      color: var(--bubble-user-ink);
      border-bottom-right-radius: 4px;
    }

    .sa-from-bot .sa-msg {
      background: var(--bubble-bot-bg);
      color: var(--bubble-bot-ink);
      border-bottom-left-radius: 4px;
    }

    .sa-typing {
      display: flex;
      gap: 4px;
      padding: 11px 14px;
    }

    .sa-typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #b6bac1;
      animation: sa-bounce 1.2s infinite;
    }

    .sa-typing span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .sa-typing span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @media (prefers-reduced-motion: reduce) {
      .sa-typing span {
        animation: none;
      }
    }

    @keyframes sa-bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.5;
      }

      30% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    #sa-form {
      display: flex;
      gap: 10px;
      padding: 16px 24px calc(16px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--panel-border);
      flex-shrink: 0;
      background: var(--panel-bg);
    }

    #sa-input {
      flex: 1;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14.5px;
      font-family: var(--font);
    }

    #sa-input:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    #sa-send {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    #sa-send:hover {
      background: #588cb4;
    }

    #sa-send:focus-visible {
      outline: 2px solid var(--header-bg);
      outline-offset: 1px;
    }

    #sa-send svg {
      width: 18px;
      height: 18px;
    }

    a {
      background-color: var(--header-bg);
      color: whitesmoke;
      text-decoration: none;
      padding-inline: 20px;
      padding-block: 10px;
      border-radius: 30px;
    }

    @media (max-width: 600px) {
      #sa-page {
        --sa-widget-height: 100dvh;
        border-radius: 0;
      }

      #sa-header {
        padding: 12px 16px;
        gap: 10px;
      }

      #sa-messages {
        padding: 16px;
        gap: 10px;
      }

      #sa-form {
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
        gap: 8px;
      }

      #sa-input {
        padding: 10px 16px;
      }

      #sa-send {
        width: 40px;
        height: 40px;
      }

      .sa-msg {
        max-width: 88%;
      }

      .sa-lang-btn {
        padding: 4px 8px;
        font-size: 11px;
      }
    }

    @media (max-width: 360px) {
      #sa-header {
        padding: 10px 12px;
      }

      .sa-title {
        font-size: 14px;
      }

      .sa-status {
        font-size: 12px;
      }

      #sa-messages {
        padding: 12px;
      }

      .sa-msg {
        max-width: 92%;
      }
    }
  </style>
</head>

<body>

  <div id="sa-container">
    <div id="sa-page">
      <header id="sa-header">
        <div class="sa-header-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path
              d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
          </svg>
        </div>
        <div class="sa-header-text">
          <span class="sa-title">Store Assistant</span>
          <span class="sa-status"><span class="sa-dot"></span>Online</span>
        </div>
        <div id="sa-lang-toggle" role="group" aria-label="Language">
          <button type="button" class="sa-lang-btn" data-lang="en">EN</button>
          <button type="button" class="sa-lang-btn" data-lang="pt">PT</button>
        </div>
      </header>

      <div id="sa-messages"></div>

      <form id="sa-form">
        <input id="sa-input" type="text" placeholder="Type your question..." autocomplete="off" />
        <button id="sa-send" type="submit" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" />
          </svg>
        </button>
      </form>
    </div>

    <a href="https://espotronica.com">Back to Espotronica</a>
  </div>

  <script>
    (function () {
      const API_BASE = 'http://localhost:3000';

      const messages = document.getElementById('sa-messages');
      const form = document.getElementById('sa-form');
      const input = document.getElementById('sa-input');
      const langButtons = document.querySelectorAll('.sa-lang-btn');

      let currentProductId = null;
      let currentProductName = null;
      let currentLang = 'en';

      const UI_TEXT = {
        en: {
          greeting: 'Hi! Ask me anything about our products \u2014 pricing, stock or specs',
          placeholder: 'Type your question...',
          looking_at: (name) => `Looking at: ${name}`,
        },
        pt: {
          greeting: 'Ol\u00e1! Pergunte-me o que quiser sobre os nossos produtos \u2014 pre\u00e7os, stock, especifica\u00e7\u00f5es ou compara\u00e7\u00f5es.',
          placeholder: 'Escreva a sua pergunta...',
          looking_at: (name) => `A ver: ${name}`,
        },
      };

      function setLang(lang, opts = {}) {
        const changed = lang !== currentLang;
        currentLang = lang;
        langButtons.forEach((btn) => {
          btn.classList.toggle('sa-lang-active', btn.dataset.lang === lang);
        });
        input.placeholder = UI_TEXT[lang].placeholder;
        if (changed && !opts.silent) {
          addSystemNote(lang === 'pt' ? 'Idioma alterado para Portugu\u00eas' : 'Language switched to English');
        }
      }

      langButtons.forEach((btn) => {
        btn.addEventListener('click', () => setLang(btn.dataset.lang));
      });

      function updateProductContext(id, name) {
        if (!id || id === currentProductId) return;
        currentProductId = id;
        currentProductName = name;
        addSystemNote(UI_TEXT[currentLang].looking_at(name));
      }

      function scrollToBottom() {
        messages.scrollTop = messages.scrollHeight;
      }

      function addMessage(text, from) {
        const row = document.createElement('div');
        row.className = `sa-row sa-from-${from}`;
        const bubble = document.createElement('div');
        bubble.className = 'sa-msg';
        bubble.textContent = text;
        row.appendChild(bubble);
        messages.appendChild(row);
        scrollToBottom();
      }

      function addSystemNote(text) {
        const row = document.createElement('div');
        row.className = 'sa-row sa-system-row';
        row.innerHTML = `<span class="sa-system-note">${text}</span>`;
        messages.appendChild(row);
        scrollToBottom();
      }

      let typingRow = null;
      function showTyping() {
        typingRow = document.createElement('div');
        typingRow.className = 'sa-row sa-from-bot';
        typingRow.innerHTML = '<div class="sa-typing"><span></span><span></span><span></span></div>';
        messages.appendChild(typingRow);
        scrollToBottom();
      }
      function hideTyping() {
        if (typingRow) {
          typingRow.remove();
          typingRow = null;
        }
      }

      function friendlyError() {
        hideTyping();
        addMessage("Sorry, I can't reach the assistant right now. Make sure the backend server is running.", 'bot');
      }

      async function askFreeText(question) {
        addMessage(question, 'user');
        showTyping();
        try {
          const res = await fetch(`${API_BASE}/api/ask-text`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question, currentProductId, lang: currentLang }),
          });
          const data = await res.json();
          hideTyping();
          if (data.matched_product_id) updateProductContext(data.matched_product_id, data.matched_product_name);
          addMessage(data.answer || 'Sorry, something went wrong.', 'bot');
        } catch (err) {
          friendlyError();
        }
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const question = input.value.trim();
        if (!question) return;
        input.value = '';
        askFreeText(question);
      });

      setLang('en', { silent: true });
      addMessage(UI_TEXT[currentLang].greeting, 'bot');
      input.focus();
    })();
  </script>
</body>

</html>
